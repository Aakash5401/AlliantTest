        customSQL:
          customSQL: ''
        dependencies:
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_PAYMENT_TRANSACTION
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_RECOVERY_TRANSACTION
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_RESERVE_TRANSACTION
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_SOURCE_SYSTEM
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_EXPERIENCE_TRANSACTION
        join:
          joinCondition: "FROM (\n  WITH VARS AS (\n      SELECT \n          (SELECT\
            \ ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM')\
            \ }} WHERE SOURCE_SYSTEM = 'ESIS') AS SOURCE_SYSTEM_ID_ESIS,\n       \
            \   IFF({{ parameters.IREPROCESSSTARTTRANSACTIONDATE }} IS NULL, \n  \
            \            (SELECT IFNULL(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ)\
            \ \n               FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_EXPERIENCE_TRANSACTION')\
            \ }} \n               WHERE ACA_SOURCE_SYSTEM_ID = SOURCE_SYSTEM_ID_ESIS),\
            \ \n               '1900-01-01'::TIMESTAMP_NTZ) AS LAST_LOAD_DATE,\n \
            \         IFNULL({{ parameters.IREPROCESSSTARTTRANSACTIONDATE }}, '1900-01-01'::DATE)\
            \ AS REPROCESS_START_TRANSACTION_DATE\n  )\n  SELECT SOURCE_SYSTEM_CLAIM_ID,\
            \ ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE,\
            \ COVERAGE_GROUP_CODE, MAX(RESERVE_TYPE) AS RESERVE_TYPE\n  FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO',\
            \ 'ACA_PAYMENT_TRANSACTION') }} AS PMT, VARS\n  WHERE PMT.ACA_SOURCE_SYSTEM_ID\
            \ = VARS.SOURCE_SYSTEM_ID_ESIS AND PMT.ACA_DATE_UPDATED > VARS.LAST_LOAD_DATE\
            \ AND PMT.TRANSACTION_DATE >= VARS.REPROCESS_START_TRANSACTION_DATE\n\
            \  GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE,\
            \ ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE\n\n  UNION\n\n  SELECT\
            \ SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, RECOVERY_TRANSACTION_DATE\
            \ AS TRANSACTION_DATE, ACA_DATE_ID_RECOVERY_TRANSACTION_DATE AS ACA_DATE_ID_TRANSACTION_DATE,\
            \ COVERAGE_GROUP_CODE, MAX(RESERVE_TYPE) AS RESERVE_TYPE\n  FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO',\
            \ 'ACA_RECOVERY_TRANSACTION') }} AS REC, VARS\n  WHERE REC.ACA_SOURCE_SYSTEM_ID\
            \ = VARS.SOURCE_SYSTEM_ID_ESIS AND REC.ACA_DATE_UPDATED > VARS.LAST_LOAD_DATE\
            \ AND REC.RECOVERY_TRANSACTION_DATE >= VARS.REPROCESS_START_TRANSACTION_DATE\n\
            \  GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, RECOVERY_TRANSACTION_DATE,\
            \ ACA_DATE_ID_RECOVERY_TRANSACTION_DATE, COVERAGE_GROUP_CODE\n\n  UNION\n\
            \n  SELECT SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE,\
            \ ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE, MAX(RESERVE_TYPE)\
            \ AS RESERVE_TYPE\n  FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_RESERVE_TRANSACTION')\
            \ }} AS RES, VARS\n  WHERE RES.ACA_SOURCE_SYSTEM_ID = VARS.SOURCE_SYSTEM_ID_ESIS\
            \ AND RES.ACA_DATE_UPDATED > VARS.LAST_LOAD_DATE AND RES.TRANSACTION_DATE\
            \ >= VARS.REPROCESS_START_TRANSACTION_DATE\n  GROUP BY SOURCE_SYSTEM_CLAIM_ID,\
            \ ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE,\
            \ COVERAGE_GROUP_CODE\n) AS U"
        name: COMBINED_SOURCE_TRANSACTIONS

operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n  USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;\n\n  UPDATE DBO.ACA_RECOVERY_TRANSACTION_STAGING_GB AS R\n  SET R.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,\n      R.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,\n      R.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED,\n      R.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER\n  FROM (\n      SELECT\n          R_INNER.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY_1,\n          R_INNER.SOURCE_SYSTEM_POLICY_ID AS JOIN_KEY_2,\n          COALESCE(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,\n          COALESCE(PO.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,\n          CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED,\n          'spaca_aca_recovery_transaction_staging_gb_update' AS NEW_ACA_UPDATE_USER\n      FROM DBO.ACA_RECOVERY_TRANSACTION_STAGING_GB AS R_INNER\n      LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C\n          ON C.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID\n      LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY AS PO\n          ON\
      \ PO.SOURCE_SYSTEM_POLICY_ID = R_INNER.SOURCE_SYSTEM_POLICY_ID\n  ) AS SOURCE\n  WHERE R.SOURCE_SYSTEM_CLAIM_ID = SOURCE.JOIN_KEY_1\n    AND R.SOURCE_SYSTEM_POLICY_ID = SOURCE.JOIN_KEY_2;\n\nEND;"
    testsEnabled: true
    truncateBefore: false

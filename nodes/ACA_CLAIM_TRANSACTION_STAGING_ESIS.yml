        join:
          joinCondition: |-
            FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM_TRANSACTION') }} AS CT
            INNER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} AS SS ON CT.ACA_SOURCE_SYSTEM_ID = SS.ACA_SOURCE_SYSTEM_ID
            INNER JOIN (
                SELECT DISTINCT SOURCE_SYSTEM_CLAIM_ID
                FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_ESIS
            ) AS T ON CT.SOURCE_SYSTEM_CLAIM_ID = T.SOURCE_SYSTEM_CLAIM_ID
            INNER JOIN (
                SELECT SOURCE_SYSTEM_CLAIM_ID, MAX(ACA_TRANSACTION_DATE) AS ACA_TRANSACTION_DATE
                FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM_TRANSACTION') }}
                WHERE ACA_SOURCE_SYSTEM_ID = SS.ACA_SOURCE_SYSTEM_ID
                GROUP BY SOURCE_SYSTEM_CLAIM_ID
            ) AS ACT ON ACT.SOURCE_SYSTEM_CLAIM_ID = CT.SOURCE_SYSTEM_CLAIM_ID AND ACT.ACA_TRANSACTION_DATE = CT.ACA_TRANSACTION_DATE
            LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_ESIS AS STG ON CT.SOURCE_SYSTEM_CLAIM_ID = STG.SOURCE_SYSTEM_CLAIM_ID
                AND CT.SOURCE_SYSTEM_TRANSACTION_DATE = STG.SOURCE_SYSTEM_TRANSACTION_DATE
            WHERE SS.SOURCE_SYSTEM = 'ESIS'
            AND STG.ACA_CLAIM_TRANSACTION_STAGING_ESIS_ID IS NULL

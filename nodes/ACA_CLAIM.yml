fileVersion: 1
id: 594c77c8-72b6-4ac4-9040-023a85114757
name: ACA_CLAIM
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

      -- Update if data has changed
      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C
      SET ACA_DATE_ID_CLAIM_DATE = IFNULL(STG.ACA_DATE_ID_CLAIM_DATE, -1)
      , ACA_DATE_ID_ORIGINAL_OPEN_DATE = IFNULL(STG.ACA_DATE_ID_ORIGINAL_OPEN_DATE, -1)
      , ACA_ACCOUNT_STRUCTURE_ID = IFNULL(STG.ACA_ACCOUNT_STRUCTURE_ID, -1)
      , CLIENT_NUMBER = STG.CLIENT_NUMBER
      , UNIT_ID = STG.UNIT_ID
      , SITE_NUMBER = STG.SITE_NUMBER
      , EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED = STG.EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED
      , EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED = STG.EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED
      , CLAIM_DATE = STG.CLAIM_DATE
      , ORIGINAL_OPEN_DATE = STG.ORIGINAL_OPEN_DATE
      , DEATH_DATE_ENCRYPTED = STG.DEATH_DATE_ENCRYPTED
      , PRODUCT_NAME = STG.PRODUCT_NAME
      , NCCI_ACT = STG.NCCI_ACT
      , SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT = STG.SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT
      , CLAIM_COVERAGE_CODE = STG.CLAIM_COVERAGE_CODE
      , ACCIDENT_CAUSE_CODE = STG.ACCIDENT_CAUSE_CODE
      , ACCIDENT_COUNTRY_CODE = STG.ACCIDENT_COUNTRY_CODE
      , BENEFIT_JURISDICTION_COUNTRY_CODE = STG.BENEFIT_JURISDICTION_COUNTRY_CODE
      , SIC_CODE = STG.SIC_CODE
      , CLIENT_OPTIONAL_ACCIDENT_CODE = STG.CLIENT_OPTIONAL_ACCIDENT_CODE
      , LOSS_CLAIMANT_SEQUENCE_NUMBER = STG.LOSS_CLAIMANT_SEQUENCE_NUMBER
      , LOSS_CLIENT_NUMBER = STG.LOSS_CLIENT_NUMBER
      , LOSS_REFERENCE_NUMBER = STG.LOSS_REFERENCE_NUMBER
      , LOSS_TRADING_PARTNER_CODE = STG.LOSS_TRADING_PARTNER_CODE
      , LOSS_TRADING_PARTNER_CODE_TYPE = STG.LOSS_TRADING_PARTNER_CODE_TYPE
      , COMPANION_ACCIDENT_NUMBER = STG.COMPANION_ACCIDENT_NUMBER
      , COMPANION_COVERAGE_CODE = STG.COMPANION_COVERAGE_CODE
      , COMPANION_COVERAGE_SEQUENCE_NUMBER = STG.COMPANION_COVERAGE_SEQUENCE_NUMBER
      , SIR_PROGRAM_FLAG = STG.SIR_PROGRAM_FLAG
      , SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID = STG.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID
      FROM {{ ref('DBSHIFT', 'ACA_CLAIM_STAGING_ESIS') }} AS STG
      WHERE C.SOURCE_SYSTEM_CLAIM_ID = STG.SOURCE_SYSTEM_CLAIM_ID
      	AND C.ACA_SOURCE_SYSTEM_ID = STG.ACA_SOURCE_SYSTEM_ID
      AND C.ACA_CLAIM_ID <> -1
      AND C.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
      AND (IFNULL(C.ACA_DATE_ID_CLAIM_DATE, -1) <> IFNULL(STG.ACA_DATE_ID_CLAIM_DATE, -1)
      	OR IFNULL(C.ACA_DATE_ID_ORIGINAL_OPEN_DATE, -1) <> IFNULL(STG.ACA_DATE_ID_ORIGINAL_OPEN_DATE, -1)
      	OR IFNULL(C.ACA_ACCOUNT_STRUCTURE_ID, -1) <> IFNULL(STG.ACA_ACCOUNT_STRUCTURE_ID, -1)
      	OR IFNULL(C.CLIENT_NUMBER, '') <> IFNULL(STG.CLIENT_NUMBER, '')
      	OR IFNULL(C.UNIT_ID, '') <> IFNULL(STG.UNIT_ID, '')
      	OR IFNULL(C.SITE_NUMBER, '') <> IFNULL(STG.SITE_NUMBER, '')
      	-- DECRYPTBYKEY cannot be directly translated to Snowflake. Encrypted fields are updated but not used for change detection.
      	OR IFNULL(C.CLAIM_DATE, '') <> IFNULL(STG.CLAIM_DATE, '')
      	OR IFNULL(C.ORIGINAL_OPEN_DATE, '') <> IFNULL(STG.ORIGINAL_OPEN_DATE, '')
      	OR IFNULL(C.PRODUCT_NAME, '') <> IFNULL(STG.PRODUCT_NAME, '')
      	OR IFNULL(C.NCCI_ACT, '') <> IFNULL(STG.NCCI_ACT, '')
      	OR IFNULL(C.SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT, '') <> IFNULL(STG.SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT, '')
      	OR IFNULL(C.CLAIM_COVERAGE_CODE, '') <> IFNULL(STG.CLAIM_COVERAGE_CODE, '')
      	OR IFNULL(C.ACCIDENT_CAUSE_CODE, '') <> IFNULL(STG.ACCIDENT_CAUSE_CODE, '')
      	OR IFNULL(C.ACCIDENT_COUNTRY_CODE, '') <> IFNULL(STG.ACCIDENT_COUNTRY_CODE, '')
      	OR IFNULL(C.BENEFIT_JURISDICTION_COUNTRY_CODE, '') <> IFNULL(STG.BENEFIT_JURISDICTION_COUNTRY_CODE, '')
      	OR IFNULL(C.SIC_CODE, '') <> IFNULL(STG.SIC_CODE, '')
      	OR IFNULL(C.CLIENT_OPTIONAL_ACCIDENT_CODE, '') <> IFNULL(STG.CLIENT_OPTIONAL_ACCIDENT_CODE, '')
      	OR IFNULL(C.LOSS_CLAIMANT_SEQUENCE_NUMBER, '') <> IFNULL(STG.LOSS_CLAIMANT_SEQUENCE_NUMBER, '')
      	OR IFNULL(C.LOSS_CLIENT_NUMBER, '') <> IFNULL(STG.LOSS_CLIENT_NUMBER, '')
      	OR IFNULL(C.LOSS_REFERENCE_NUMBER, '') <> IFNULL(STG.LOSS_REFERENCE_NUMBER, '')
      	OR IFNULL(C.LOSS_TRADING_PARTNER_CODE, '') <> IFNULL(STG.LOSS_TRADING_PARTNER_CODE, '')
      	OR IFNULL(C.LOSS_TRADING_PARTNER_CODE_TYPE, '') <> IFNULL(STG.LOSS_TRADING_PARTNER_CODE_TYPE, '')
      	OR IFNULL(C.COMPANION_ACCIDENT_NUMBER, '') <> IFNULL(STG.COMPANION_ACCIDENT_NUMBER, '')
      	OR IFNULL(C.COMPANION_COVERAGE_CODE, '') <> IFNULL(STG.COMPANION_COVERAGE_CODE, '')
      	OR IFNULL(C.COMPANION_COVERAGE_SEQUENCE_NUMBER, '') <> IFNULL(STG.COMPANION_COVERAGE_SEQUENCE_NUMBER, '')
      	OR IFNULL(C.SIR_PROGRAM_FLAG, '') <> IFNULL(STG.SIR_PROGRAM_FLAG, '')
      	OR IFNULL(C.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID, '0x') <> IFNULL(STG.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID, '0x')
      	);

      END;

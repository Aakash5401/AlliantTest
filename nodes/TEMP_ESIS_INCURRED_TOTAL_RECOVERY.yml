            \ C.ACA_RESERVE_TYPE_ID = REC.ACA_RESERVE_TYPE_ID\n  WHERE REC.ACA_SOURCE_SYSTEM_ID\
            \ = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO',\
            \ 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS') AND REC.RECOVERY_TRANSACTION_DATE\
            \ <= C.TRANSACTION_DATE\n  GROUP BY REC.SOURCE_SYSTEM_CLAIM_ID, REC.ACA_RESERVE_TYPE_ID,\

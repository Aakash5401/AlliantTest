          joinCondition: "FROM (\n  SELECT REC.SOURCE_SYSTEM_CLAIM_ID, REC.ACA_RESERVE_TYPE_ID,\
            \ C.TRANSACTION_DATE, MAX(REC.COVERAGE_GROUP_CODE) AS COVERAGE_GROUP_CODE,\
            \ MAX(REC.RESERVE_TYPE) AS RESERVE_TYPE, SUM(REC.RECOVERY_AMOUNT_BY_RESERVE_TYPE)\

          PD: PD
        customSQL:
          customSQL: ''
        dependencies:
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_TRANSACTION_CLAIM
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_BODY_PART_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_ACCIDENT_TYPE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_NATURE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_ACCIDENT_SOURCE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_PYRAMID
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: "FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_TRANSACTION_CLAIM')\
            \ }} AS C\nLEFT OUTER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_REF', 'ACA_BODY_PART_CODE')\
            \ }} AS BPC ON C.PART_OF_BODY_CODE = BPC.PART_OF_BODY_CODE \nLEFT OUTER\
            \ JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_REF', 'ACA_ACCIDENT_TYPE_CODE') }}\
            \ AS ATC ON C.ACCIDENT_TYPE_CODE = ATC.TYPE_CODE \nLEFT OUTER JOIN {{\
            \ ref('ALLIANT_CLAIMS_ASTRUS_REF', 'ACA_NATURE_CODE') }} AS NC ON C.NATURE_OF_LOSS_CODE_BODILY_INJURY\
            \ = NC.NATURE_CODE\nLEFT OUTER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_REF',\
            \ 'ACA_NATURE_CODE') }} AS NC1 ON C.NATURE_OF_LOSS_CODE_PROPERTY_DAMAGE\
            \ = NC1.NATURE_CODE\nLEFT OUTER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_REF',\
            \ 'ACA_ACCIDENT_SOURCE_CODE') }} AS ACCS ON C.ACCIDENT_SOURCE_CODE = ACCS.ACCIDENT_SOURCE_CODE\
            \ AND ACCS.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{\
            \ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM\
            \ = 'GB')\nLEFT JOIN (SELECT CLIENT, UNIT_ID, MAX(LEVEL) AS LEVEL\n  \
            \         FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_PYRAMID') }}\n\
            \           GROUP BY CLIENT, UNIT_ID) AS L\nON L.CLIENT = C.CLIENT_NUMBER\n\
            AND L.UNIT_ID = RTRIM(C.REPORTING_UNIT_NUMBER)\nLEFT OUTER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO',\
            \ 'ACA_PYRAMID') }} AS PD\nON PD.CLIENT = L.CLIENT\nAND PD.UNIT_ID = L.UNIT_ID\n\
            AND PD.LEVEL = L.LEVEL"

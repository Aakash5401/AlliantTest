          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: "FROM (\n  SELECT INC.SOURCE_SYSTEM_CLAIM_ID, INC.ACA_RESERVE_TYPE_ID,\
            \ MAX(INC.COVERAGE_GROUP_CODE) AS COVERAGE_GROUP_CODE, MAX(INC.RESERVE_TYPE)\
            \ AS RESERVE_TYPE, SUM(INC.EXPERIENCE_AMOUNT_BY_RESERVE_TYPE) AS INCURRED_AMOUNT,\
            \ IFNULL(MAX(INC.TRANSACTION_SEQUENCE_NUMBER), 0) AS TRANSACTION_SEQUENCE_NUMBER\n\
            \  FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_EXPERIENCE_TRANSACTION')\
            \ }} AS INC\n  INNER JOIN (\n      SELECT SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID,\
            \ MIN(ACA_DATE_ID_TRANSACTION_DATE) AS ACA_DATE_ID_TRANSACTION_DATE\n\
            \      FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION')\
            \ }}\n      GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID\n  )\
            \ AS C ON C.SOURCE_SYSTEM_CLAIM_ID = INC.SOURCE_SYSTEM_CLAIM_ID AND C.ACA_RESERVE_TYPE_ID\
            \ = INC.ACA_RESERVE_TYPE_ID AND C.ACA_DATE_ID_TRANSACTION_DATE > INC.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE\n\
            \  WHERE INC.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM\
            \ {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM\
            \ = 'ESIS')\n  GROUP BY INC.SOURCE_SYSTEM_CLAIM_ID, INC.ACA_RESERVE_TYPE_ID\n\
            ) AS U"

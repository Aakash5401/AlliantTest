        join:
          joinCondition: |-
            FROM {{ ref('DBSHIFT', 'ACA_EXPERIENCE_TRANSACTION') }} AS INC
            INNER JOIN (
              SELECT
                SOURCE_SYSTEM_CLAIM_ID,
                ACA_RESERVE_TYPE_ID,
                MIN(ACA_DATE_ID_TRANSACTION_DATE) AS ACA_DATE_ID_TRANSACTION_DATE
              FROM {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION') }}
              GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID
            ) AS C
            ON C.SOURCE_SYSTEM_CLAIM_ID = INC.SOURCE_SYSTEM_CLAIM_ID
            AND C.ACA_RESERVE_TYPE_ID = INC.ACA_RESERVE_TYPE_ID
            AND C.ACA_DATE_ID_TRANSACTION_DATE > INC.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE
            WHERE INC.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS')
            GROUP BY INC.SOURCE_SYSTEM_CLAIM_ID, INC.ACA_RESERVE_TYPE_ID

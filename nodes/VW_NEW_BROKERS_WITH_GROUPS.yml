    cteString: ""
    enabledColumnTestIDs: []
    sourceMapping:
      - aliases: {}
        customSQL:
          customSQL: |-
            WITH BROKER_STATS AS (
                SELECT 
                    MAX(TRY_TO_NUMBER(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1))) AS MAX_GROUP_ID,
                    COUNT(1) AS COUNT_OF_MAX_GROUP_ID
                FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER') }}
                WHERE TRY_TO_NUMBER(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1)) = 
                    (SELECT MAX(TRY_TO_NUMBER(SUBSTRING(PARENT_PLANNING_ID, 1, CHARINDEX('_', PARENT_PLANNING_ID) - 1))) FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER') }})
            ),
            RANKED_NULLS AS (
                SELECT 
                    *,
                    ROW_NUMBER() OVER (ORDER BY ROW_ID) as RN
                FROM {{ ref('DBSHIFT', 'VW_TMP_NEW_PLANNING_BROKER') }}
                WHERE GROUP_ID_INITIAL IS NULL
            )
            SELECT
                NB.PLANNING_ID,
                NB.BROKER_NAME,
                NB.BROKER_LOOKUP_CODE,
                NB.BROKER_STATUS_INDICATOR,
                NB.BROKER_ALIAS,
                NB.SOURCE_SYSTEM_BROKER_LOOKUP_CODE,
                NB.SOURCE_SYSTEM_BROKER_ID,
                NB.SOURCE_SYSTEM,
                NB.DW_BROKER_MASTER_ID,
                NB.DW_SOURCE_SYSTEM_ID,
                NB.ROW_ID,
                NB.BEGIN_POST_DATE,
                NB.END_POST_DATE,
                CASE 
                    WHEN NB.GROUP_ID_INITIAL IS NOT NULL THEN NB.GROUP_ID_INITIAL
                    WHEN S.MAX_GROUP_ID IS NOT NULL AND RN.RN <= (300 - S.COUNT_OF_MAX_GROUP_ID) THEN S.MAX_GROUP_ID
                    ELSE IFNULL(S.MAX_GROUP_ID, 0) + 1 + FLOOR((RN.RN - IFNULL(300 - S.COUNT_OF_MAX_GROUP_ID, 0) - 1) / 300)
                END AS GROUP_ID,
                CASE 
                    WHEN NB.GROUP_NAME_INITIAL IS NOT NULL THEN NB.GROUP_NAME_INITIAL
                    WHEN S.MAX_GROUP_ID IS NOT NULL AND RN.RN <= (300 - S.COUNT_OF_MAX_GROUP_ID) THEN CONCAT(S.MAX_GROUP_ID, '_Producer_Parent')
                    ELSE CONCAT(IFNULL(S.MAX_GROUP_ID, 0) + 1 + FLOOR((RN.RN - IFNULL(300 - S.COUNT_OF_MAX_GROUP_ID, 0) - 1) / 300), '_Producer_Parent')
                END AS GROUP_NAME,
                CASE 
                    WHEN NB.PARENT_PLANNING_ID IS NOT NULL THEN NB.PARENT_PLANNING_ID
                    WHEN S.MAX_GROUP_ID IS NOT NULL AND RN.RN <= (300 - S.COUNT_OF_MAX_GROUP_ID) THEN CONCAT(S.MAX_GROUP_ID, '_Producer_Parent')
                    ELSE CONCAT(IFNULL(S.MAX_GROUP_ID, 0) + 1 + FLOOR((RN.RN - IFNULL(300 - S.COUNT_OF_MAX_GROUP_ID, 0) - 1) / 300), '_Producer_Parent')
                END AS PARENT_PLANNING_ID
            FROM {{ ref('DBSHIFT', 'VW_TMP_NEW_PLANNING_BROKER') }} NB
            LEFT JOIN RANKED_NULLS RN ON NB.ROW_ID = RN.ROW_ID
            CROSS JOIN BROKER_STATS S
        dependencies:
          - locationName: DBSHIFT
            nodeName: VW_TMP_NEW_PLANNING_BROKER
          - locationName: DBSHIFT
            nodeName: PLANNING_FCCS_BROKER
        join:
          joinCondition: ""
        name: VW_NEW_BROKERS_WITH_GROUPS
        noLinkRefs: []

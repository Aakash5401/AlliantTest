operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_GB AS R
      SET
          R.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
          R.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,
          R.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          R.ACA_UPDATE_USER = 'spaca_aca_recovery_transaction_staging_gb_update'
      FROM (
          SELECT
              RT.SOURCE_SYSTEM_CLAIM_ID,
              RT.SOURCE_SYSTEM_POLICY_ID,
              COALESCE(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
              COALESCE(PO.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID
          FROM
              ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_GB AS RT
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C
              ON C.SOURCE_SYSTEM_CLAIM_ID = RT.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY AS PO
              ON PO.SOURCE_SYSTEM_POLICY_ID = RT.SOURCE_SYSTEM_POLICY_ID
      ) AS SOURCE
      WHERE
          R.SOURCE_SYSTEM_CLAIM_ID IS NOT DISTINCT FROM SOURCE.SOURCE_SYSTEM_CLAIM_ID
          AND R.SOURCE_SYSTEM_POLICY_ID IS NOT DISTINCT FROM SOURCE.SOURCE_SYSTEM_POLICY_ID;
      END;
    testsEnabled: true
    truncateBefore: false

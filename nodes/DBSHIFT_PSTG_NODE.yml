operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS;
      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_TRANSACTION T
      SET
          ACA_CLAIM_ID = IFF(
              T.ACA_CLAIM_ID = -1,
              (SELECT IFNULL(MAX(C.ACA_CLAIM_ID), -1)
               FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM C
               WHERE T.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID AND T.ACA_SOURCE_SYSTEM_ID = C.SOURCE_SYSTEM_ID),
              T.ACA_CLAIM_ID
          ),
          ACA_POLICY_ID = IFF(
              T.ACA_POLICY_ID = -1,
              (SELECT IFNULL(MAX(P.ACA_POLICY_ID), -1)
               FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY P
               WHERE T.SOURCE_SYSTEM_POLICY_ID = P.SOURCE_SYSTEM_POLICY_ID),
              T.ACA_POLICY_ID
          ),
          ACA_CLAIMANT_ID = IFF(
              T.ACA_CLAIMANT_ID = -1,
              (SELECT IFNULL(MAX(CL.ACA_CLAIMANT_ID), -1)
               FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT CL
               WHERE T.SOURCE_SYSTEM_CLAIMANT_ID = CL.SOURCE_SYSTEM_CLAIMANT_ID),
              T.ACA_CLAIMANT_ID
          ),
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'spaca_aca_claim_transaction_update'
      WHERE
          (T.ACA_CLAIM_ID = -1 AND T.SOURCE_SYSTEM_CLAIM_ID IS NOT NULL)
          OR (T.ACA_POLICY_ID = -1 AND T.SOURCE_SYSTEM_POLICY_ID IS NOT NULL)
          OR (T.ACA_CLAIMANT_ID = -1 AND T.SOURCE_SYSTEM_CLAIMANT_ID IS NOT NULL);
      END;
    testsEnabled: true
    truncateBefore: false

name: ACA_CLAIM_TRANSACTION
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS;

      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_TRANSACTION AS T
      SET 
          ACA_CURRENT_FLAG = STG.ACA_CURRENT_FLAG,
          ACA_UPDATE_USER = CONCAT('spaca_aca_claim_transaction_esis_insertUpdate', ' - flag update'),
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP()
      FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_CLAIM_TRANSACTION_STAGING_ESIS') }} AS STG 
      WHERE T.SOURCE_SYSTEM_CLAIM_ID = STG.SOURCE_SYSTEM_CLAIM_ID
        AND T.ACA_SOURCE_SYSTEM_ID = STG.ACA_SOURCE_SYSTEM_ID
        AND T.ACA_TRANSACTION_DATE = STG.ACA_TRANSACTION_DATE
        AND T.ACA_CURRENT_FLAG <> STG.ACA_CURRENT_FLAG;

      END;

          - locationName: DBSHIFT
            nodeName: ACA_EXPERIENCE_TRANSACTION
        join:
          joinCondition: |-
            FROM (SELECT
              SOURCE_SYSTEM_CLAIM_ID,
              ACA_RESERVE_TYPE_ID,
              TRANSACTION_DATE,
              ACA_DATE_ID_TRANSACTION_DATE,
              COVERAGE_GROUP_CODE,
              MAX(RESERVE_TYPE) AS RESERVE_TYPE
            FROM {{ ref('DBSHIFT', 'ACA_PAYMENT_TRANSACTION') }}
            WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS')
              AND ACA_DATE_UPDATED > (SELECT IFNULL(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM {{ ref('DBSHIFT', 'ACA_EXPERIENCE_TRANSACTION') }} WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS'))
              AND TRANSACTION_DATE >= '1900-01-01'::DATE
            GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE

            UNION

            SELECT
              SOURCE_SYSTEM_CLAIM_ID,
              ACA_RESERVE_TYPE_ID,
              RECOVERY_TRANSACTION_DATE AS TRANSACTION_DATE,
              ACA_DATE_ID_RECOVERY_TRANSACTION_DATE AS ACA_DATE_ID_TRANSACTION_DATE,
              COVERAGE_GROUP_CODE,
              MAX(RESERVE_TYPE) AS RESERVE_TYPE
            FROM {{ ref('DBSHIFT', 'ACA_RECOVERY_TRANSACTION') }}
            WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS')
              AND ACA_DATE_UPDATED > (SELECT IFNULL(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM {{ ref('DBSHIFT', 'ACA_EXPERIENCE_TRANSACTION') }} WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS'))
              AND RECOVERY_TRANSACTION_DATE >= '1900-01-01'::DATE
            GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, RECOVERY_TRANSACTION_DATE, ACA_DATE_ID_RECOVERY_TRANSACTION_DATE, COVERAGE_GROUP_CODE

            UNION

            SELECT
              SOURCE_SYSTEM_CLAIM_ID,
              ACA_RESERVE_TYPE_ID,
              TRANSACTION_DATE,
              ACA_DATE_ID_TRANSACTION_DATE,
              COVERAGE_GROUP_CODE,
              MAX(RESERVE_TYPE) AS RESERVE_TYPE
            FROM {{ ref('DBSHIFT', 'ACA_RESERVE_TRANSACTION') }}
            WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS')
              AND ACA_DATE_UPDATED > (SELECT IFNULL(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM {{ ref('DBSHIFT', 'ACA_EXPERIENCE_TRANSACTION') }} WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'ESIS'))
              AND TRANSACTION_DATE >= '1900-01-01'::DATE
            GROUP BY SOURCE_SYSTEM_CLAIM_ID, ACA_RESERVE_TYPE_ID, TRANSACTION_DATE, ACA_DATE_ID_TRANSACTION_DATE, COVERAGE_GROUP_CODE) AS U

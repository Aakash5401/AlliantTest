            nodeName: TEMP_ESIS_INCURRED_TOTAL_RESERVE
          - locationName: DBSHIFT
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |-
            FROM {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_NEW_TRANSACTION') }} AS C
            LEFT JOIN {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_EXISTING_INCURRED') }} AS INC
            ON INC.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID
            AND INC.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID
            LEFT JOIN {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_MAX_TRANSACTION_SEQUENCE_NUMBER') }} AS TS
            ON TS.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID
            LEFT JOIN {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_TOTAL_PAYMENT') }} AS PMT
            ON PMT.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID
            AND PMT.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID
            AND PMT.TRANSACTION_DATE = C.TRANSACTION_DATE
            LEFT JOIN {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_TOTAL_RECOVERY') }} AS REC
            ON REC.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID
            AND REC.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID
            AND REC.TRANSACTION_DATE = C.TRANSACTION_DATE
            LEFT JOIN {{ ref('DBSHIFT', 'TEMP_ESIS_INCURRED_TOTAL_RESERVE') }} AS RES
            ON RES.SOURCE_SYSTEM_CLAIM_ID = C.SOURCE_SYSTEM_CLAIM_ID
            AND RES.ACA_RESERVE_TYPE_ID = C.ACA_RESERVE_TYPE_ID
            AND RES.TRANSACTION_DATE = C.TRANSACTION_DATE

operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_TRANSACTION
      WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE SOURCE_SYSTEM = 'GB')
      AND TRANSACTION_DATE IN (SELECT TRANSACTION_DATE
                                   FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_PAYMENT_TRANSACTION_STAGING_GB') }}
                                   GROUP BY TRANSACTION_DATE);
      DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_TRANSACTION
      WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE SOURCE_SYSTEM = 'ESIS')
      AND TRANSACTION_DATE IN (SELECT TRANSACTION_DATE
                                   FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }}
                                   GROUP BY TRANSACTION_DATE);
      END;
    testsEnabled: true
    truncateBefore: false
